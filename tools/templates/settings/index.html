{% extends "settings/base_settings.html" %}
{% block title %}Profile Settings{% endblock %}
{% block settings_content %}
<h2 style="font-size:1.4rem;margin-bottom:20px">👤 Profile</h2>

<!-- Profile -->
<div class="card" style="margin-bottom:16px">
  <h3 style="font-size:1rem;margin-bottom:16px">Account Info</h3>
  <form method="POST" action="{{ url_for('settings.update_profile') }}">
    <div class="form-group">
      <label>Business / Display Name</label>
      <input type="text" name="name" value="{{ user['tenant_name'] or '' }}" placeholder="Your business name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" value="{{ user['email'] }}" required>
    </div>
    <button type="submit" class="btn btn-green">Save Profile</button>
  </form>
</div>

<!-- Password -->
<div class="card">
  <h3 style="font-size:1rem;margin-bottom:16px">Change Password</h3>
  <form method="POST" action="{{ url_for('settings.change_password') }}">
    <div class="form-group">
      <label>Current Password</label>
      <input type="password" name="current_password" required placeholder="Your current password">
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" name="new_password" required placeholder="Min 6 characters" minlength="6">
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" name="confirm_password" required placeholder="Same as above">
    </div>
    <button type="submit" class="btn btn-outline">Change Password</button>
  </form>
</div>
{% endblock %}
