# Copy this to .github/workflows/test.yml in each app repo
# Replace APP_NAME and APP_URL with the actual values

name: Test & Deploy — APP_NAME

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Python syntax
        run: python3 -c "import ast; ast.parse(open('app.py').read()); print('✅ Syntax OK')"
      - name: Lint
        run: |
          pip install flake8 -q
          flake8 app.py --max-line-length=200 --ignore=E501,W503,E302,E303,W291,W293,E711,E712 || true

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: syntax-check
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for Railway deploy
        run: sleep 90
      - name: Health check with retries
        run: |
          for i in {1..8}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" APP_URL/health)
            BODY=$(curl -s APP_URL/health)
            echo "Attempt $i: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ]; then echo "✅ Healthy!"; exit 0; fi
            sleep 15
          done
          echo "❌ Failed health check"; exit 1

  playwright-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: health-check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          pip install playwright pytest pytest-playwright requests -q
          playwright install chromium --with-deps -q
      - name: Test
        run: |
          cat > test_app.py << 'EOF'
          import requests
          from playwright.sync_api import sync_playwright

          BASE = "APP_URL"

          def test_health():
              r = requests.get(f"{BASE}/health", timeout=15)
              assert r.status_code == 200
              assert r.json()["status"] == "ok"

          def test_homepage():
              r = requests.get(BASE, timeout=15)
              assert r.status_code == 200

          def test_login_page():
              r = requests.get(f"{BASE}/login", timeout=15, allow_redirects=True)
              assert r.status_code == 200

          def test_signup_page():
              r = requests.get(f"{BASE}/signup", timeout=15, allow_redirects=True)
              assert r.status_code == 200
          EOF
          python3 -m pytest test_app.py -v --tb=short
